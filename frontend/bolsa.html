<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RCS | Bolsa de Trabajo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #f7faff;
      color: #111;
      font-family: "Helvetica Neue", Arial, sans-serif;
      padding: 28px 16px;
    }
    main { width: min(860px, 100%); margin: 0 auto; }
    .top-nav {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      flex-wrap: wrap;
      margin: 0 0 18px;
    }
    .top-nav a {
      text-decoration: none;
      font-family: "Manrope", "Helvetica Neue", Arial, sans-serif;
      font-size: 0.84rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #1e264b;
    }
    .top-nav .sep { color: #7a86ab; }
    h1 {
      margin: 0 0 14px;
      font-family: "Manrope", "Helvetica Neue", Arial, sans-serif;
      font-size: clamp(1.7rem, 5vw, 2.3rem);
      color: #1e264b;
    }
    .powered {
      margin: 0 0 18px;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: #2d67c8;
    }
    .job-card {
      border: 1px solid #dbe7fb;
      border-radius: 14px;
      padding: 18px;
      background: #fff;
    }
    .job-card h2 {
      margin: 0 0 8px;
      color: #13233f;
      font-size: 1.15rem;
    }
    .job-card p {
      margin: 0 0 14px;
      color: #4f5e7a;
      line-height: 1.5;
    }
    .job-link {
      display: inline-block;
      text-decoration: none;
      font-weight: 700;
      color: #fff;
      background: #1e264b;
      border: 1px solid #1e264b;
      border-radius: 10px;
      padding: 10px 15px;
    }
  </style>
</head>
<body>
  <main>
    <nav class="top-nav" aria-label="Navegación principal">
      <a href="/">Home</a>
      <span class="sep">/</span>
      <a href="/eventos">Eventos</a>
      <span class="sep">/</span>
      <a href="/publicaciones">Publicaciones</a>
    </nav>

    <h1>Bolsa de Trabajo</h1>
    <p class="powered">Powered by Safhire</p>

    <article class="job-card" aria-label="Vacante disponible en Safhire">
      <h2>Production Planner</h2>
      <p>Postula directamente en Safhire y completa tu proceso de aplicación en línea.</p>
      <a class="job-link" href="https://app.safhire.ai/es/apply/MTI5LWpvYi1pZC1rZXktMjAyNA" target="_blank" rel="noopener noreferrer">Aplicar a la vacante</a>
    </article>
  </main>
</body>
</html>
