<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Red de Cadena de Suministro México</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #ffffff;
      color: #111111;
      font-family: "Helvetica Neue", Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    main {
      width: min(1120px, 100%);
      text-align: center;
    }

    h1 {
      margin: 0 0 32px;
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .logos {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 26px;
      align-items: center;
      margin-bottom: 34px;
    }

    .logos-bottom {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 24px;
      max-width: 520px;
      margin: 0 auto;
    }

    .logos-partners {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 24px;
      margin: 24px auto 0;
    }

    .logo-item {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 120px;
      padding: 14px;
      border: 1px solid #e8e8e8;
      border-radius: 14px;
    }

    .logo-item img {
      width: 100%;
      max-width: 300px;
      max-height: 110px;
      object-fit: contain;
    }

    .logo-item a {
      display: block;
      width: 100%;
    }

    .logo-name {
      font-weight: 700;
      font-size: 1.05rem;
      color: #13233f;
      letter-spacing: 0.01em;
    }

    .eventos-home {
      margin: 34px auto 0;
      max-width: 760px;
      border: 1px solid #e8e8e8;
      border-radius: 14px;
      padding: 22px 18px;
      text-align: left;
      background: #fafcff;
    }

    .eventos-home h2 {
      margin: 0 0 8px;
      font-size: clamp(1.2rem, 3vw, 1.6rem);
      color: #13233f;
    }

    .eventos-home p {
      margin: 0 0 12px;
      color: #4f5e7a;
      line-height: 1.5;
    }

    .eventos-link {
      display: inline-block;
      text-decoration: none;
      font-weight: 700;
      color: #ffffff;
      background: #0f5bd8;
      border: 1px solid #0f5bd8;
      border-radius: 10px;
      padding: 9px 14px;
    }

    @media (max-width: 760px) {
      .logos {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .logos-bottom {
        grid-template-columns: 1fr;
      }

      .logos-partners {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Red de Cadena de Suministro México</h1>
    <section class="logos" aria-label="Logos del proyecto">
      <div class="logo-item">
        <a href="https://demafront.cl/" target="_blank" rel="noopener noreferrer" aria-label="Ir al sitio de DemaFront">
          <img src="/logos/demafront.png" alt="DemaFront" />
        </a>
      </div>
      <div class="logo-item">
        <a href="https://www.sympleglobal.com/" target="_blank" rel="noopener noreferrer" aria-label="Ir al sitio de Symple Global">
          <img src="/logos/symple-brand.png" alt="Symple" />
        </a>
      </div>
      <div class="logo-item">
        <a href="https://cxhiway.com/" target="_blank" rel="noopener noreferrer" aria-label="Ir al sitio de Hiway">
          <img src="/logos/hiway.jpeg" alt="Hiway" />
        </a>
      </div>
      <div class="logo-item">
        <a href="https://unklatam.com/" target="_blank" rel="noopener noreferrer" aria-label="Ir al sitio de UNK LATAM">
          <img src="/logos/unklatam-logo.jpeg" alt="UNK LATAM" />
        </a>
      </div>
      <div class="logo-item">
        <a href="https://www.theowlsolutions.lat/" target="_blank" rel="noopener noreferrer" aria-label="Ir al sitio de The Owl Solutions">
          <img src="/logos/the-owl.jpeg" alt="The Owl" />
        </a>
      </div>
    </section>

    <section class="logos-bottom" aria-label="Logos adicionales">
      <div class="logo-item">
        <a href="https://www.prochile.gob.cl/" target="_blank" rel="noopener noreferrer" aria-label="Ir al sitio de ProChile">
          <img src="/logos/prochile.jpeg" alt="ProChile" />
        </a>
      </div>
      <div class="logo-item">
        <a href="https://camaramexicanachilena.com.mx/" target="_blank" rel="noopener noreferrer" aria-label="Ir al sitio de la Cámara Mexicano Chilena">
          <img src="/logos/logo-camara.jpg" alt="Cámara" />
        </a>
      </div>
    </section>

    <section class="logos-partners" aria-label="Logos aliados adicionales">
      <div class="logo-item">
        <span class="logo-name">Orbitar Estudio</span>
      </div>
      <div class="logo-item">
        <a href="https://monttgroup.com/en/home/" target="_blank" rel="noopener noreferrer" aria-label="Ir al sitio de Montt Group">
          <img src="/logos/montt-casa-logo.jpeg" alt="Montt Casa" />
        </a>
      </div>
      <div class="logo-item">
        <a href="https://hooman.com.mx/home-5/" target="_blank" rel="noopener noreferrer" aria-label="Ir al sitio de Hooman">
          <img src="/logos/hooman-azul.jpg" alt="Hooman" />
        </a>
      </div>
      <div class="logo-item">
        <a href="https://integralegal.com.mx/home/" target="_blank" rel="noopener noreferrer" aria-label="Ir al sitio de Integralegal">
          <img src="/logos/integralegal.jpeg" alt="Integralegal" />
        </a>
      </div>
    </section>

    <section class="eventos-home" aria-label="Sección de eventos">
      <h2>Eventos</h2>
      <p>Consulta el resumen de actividades de networking y participación institucional de la Red de Cadena de Suministro México.</p>
      <a class="eventos-link" href="/eventos">Ver eventos</a>
    </section>
  </main>
</body>
</html>
