<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Red de Cadena de Suministro México</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #ffffff;
      color: #111111;
      font-family: "Helvetica Neue", Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    main {
      width: min(1120px, 100%);
      text-align: center;
    }

    h1 {
      margin: 0 0 32px;
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .logos {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 26px;
      align-items: center;
      margin-bottom: 34px;
    }

    .logos-bottom {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 24px;
      max-width: 520px;
      margin: 0 auto;
    }

    .logo-item {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 120px;
      padding: 14px;
      border: 1px solid #e8e8e8;
      border-radius: 14px;
    }

    .logo-item img {
      width: 100%;
      max-width: 300px;
      max-height: 110px;
      object-fit: contain;
    }

    .logo-item a {
      display: block;
      width: 100%;
    }

    @media (max-width: 760px) {
      .logos {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .logos-bottom {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Red de Cadena de Suministro México</h1>
    <section class="logos" aria-label="Logos del proyecto">
      <div class="logo-item">
        <a href="https://demafront.cl/" target="_blank" rel="noopener noreferrer" aria-label="Ir al sitio de DemaFront">
          <img src="/logos/demafront.png" alt="DemaFront" />
        </a>
      </div>
      <div class="logo-item">
        <a href="https://www.sympleglobal.com/" target="_blank" rel="noopener noreferrer" aria-label="Ir al sitio de Symple Global">
          <img src="/logos/symple-brand.png" alt="Symple" />
        </a>
      </div>
      <div class="logo-item">
        <a href="https://klog.co/" target="_blank" rel="noopener noreferrer" aria-label="Ir al sitio de KLog">
          <img src="/logos/klog.jpg" alt="KLog" />
        </a>
      </div>
      <div class="logo-item">
        <a href="https://unklatam.com/" target="_blank" rel="noopener noreferrer" aria-label="Ir al sitio de UNK LATAM">
          <img src="/logos/unklatam-logo.jpeg" alt="UNK LATAM" />
        </a>
      </div>
      <div class="logo-item">
        <a href="https://www.theowlsolutions.lat/" target="_blank" rel="noopener noreferrer" aria-label="Ir al sitio de The Owl Solutions">
          <img src="/logos/the-owl.jpeg" alt="The Owl" />
        </a>
      </div>
    </section>

    <section class="logos-bottom" aria-label="Logos adicionales">
      <div class="logo-item"><img src="/logos/prochile.jpeg" alt="ProChile" /></div>
      <div class="logo-item">
        <a href="https://camaramexicanachilena.com.mx/" target="_blank" rel="noopener noreferrer" aria-label="Ir al sitio de la Cámara Mexicano Chilena">
          <img src="/logos/logo-camara.jpg" alt="Cámara" />
        </a>
      </div>
    </section>
  </main>
</body>
</html>
